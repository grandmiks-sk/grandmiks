<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SK Group — Grand MIKS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .top-logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }
    .top-logos img {
      height: 80px;
      width: 80px;
      object-fit: contain;
      border-radius: 50%;
      background: white;
      padding: 6px;
    }
    .top-logos .sk {
      border-radius: 10px;
      padding: 10px;
    }

    h1 {
      color: white;
      font-size: 1.1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 48px;
      opacity: 0.5;
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 700px;
    }

    .card {
      flex: 1;
      min-width: 260px;
      text-decoration: none;
      border-radius: 20px;
      padding: 48px 32px;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-6px);
    }

    .card-grand {
      background: linear-gradient(135deg, #d42b2b, #ff6b6b);
      box-shadow: 0 8px 32px rgba(212,43,43,0.4);
    }
    .card-grand:hover {
      box-shadow: 0 16px 48px rgba(212,43,43,0.6);
    }

    .card-sk {
      background: linear-gradient(135deg, #1a1a1a, #333);
      border: 2px solid #444;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .card-sk:hover {
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      border-color: #666;
    }

    .card img {
      height: 80px;
      width: 80px;
      object-fit: contain;
      border-radius: 50%;
      background: white;
      padding: 6px;
      margin-bottom: 20px;
    }
    .card-sk img {
      border-radius: 10px;
      padding: 10px;
    }

    .card h2 {
      color: white;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .card p {
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
    }

    .arrow {
      margin-top: 24px;
      color: rgba(255,255,255,0.5);
      font-size: 1.4rem;
    }

    footer {
      margin-top: 48px;
      color: #444;
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="top-logos">
    <img src="logo-grandmiks.jpg" alt="Grand MIKS" />
    <img src="logo-skgroup.jpg" alt="SK Group" class="sk" />
  </div>

  <h1>Выберите раздел</h1>

  <div class="cards">
    <a class="card card-grand" href="grandmiks.html">
      <img src="logo-grandmiks.jpg" alt="Grand MIKS" />
      <h2>GRAND MIKS</h2>
      <p>Мебельная фабрика</p>
      <div class="arrow">→</div>
    </a>

    <a class="card card-sk" href="skgroup.html">
      <img src="logo-skgroup.jpg" alt="SK Group" class="sk" />
      <h2>SK GROUP</h2>
      <p>Управляющая компания</p>
      <div class="arrow">→</div>
    </a>
  </div>

  <footer>© 2025 SK Group · Grand MIKS · Kazakhstan</footer>

</body>
</html>
